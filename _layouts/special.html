---
layout: post
---

<style>
    /* 1. 強制讓地圖容器在大螢幕與目錄並排 */
    .info-row {
        display: flex !important;
        flex-wrap: wrap !important;
        gap: 20px !important;
    }

    /* 2. 擴大地圖容器的寬度與高度 */
    .city-static-map-container {
        flex: 2 1 450px !important;
        display: block !important; /* 確保地圖容器顯示 */
        height: auto !important;
    }

    #static-map {
        height: 450px !important; /* 增加地圖高度 */
        width: 100% !important;
    }

    .toc-box {
        flex: 1 1 250px !important;
    }

    @media (max-width: 900px) {
        .city-static-map-container { flex: 1 1 auto !important; }
        #static-map { height: 350px !important; }
    }
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // 延遲一小段時間確保 post.html 的地圖已經初始化
    setTimeout(function() {
        const mapElement = document.getElementById('static-map');
        if (!mapElement) return;

        // 取得 Leaflet 地圖實例 (post.html 裡面創立的那個)
        // 由於 Leaflet 不方便直接抓取現有實例，我們直接重繪
        if (mapElement._leaflet_id) {
            mapElement._leaflet_id = null;
            mapElement.innerHTML = "";
        }

        const mapCenter = [{{ page.map_center | default: "50.05, 7.75" }}];
        const zoomLevel = {{ page.map_zoom | default: 11 }};
        const mainMap = L.map('static-map').setView(mapCenter, zoomLevel);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(mainMap);

        // 載入州界
        fetch("{{ site.baseurl }}/assets/germany_states.json")
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "#2c3e50", weight: 1, fillOpacity: 0.05 }
                }).addTo(mainMap);
            });

        // 載入城堡標點
        const locations = [
          {% assign data_name = page.data_source %}
          {% if site.data[data_name] %}
            {% for item in site.data[data_name] %}
            {
              name: "{{ item[page.lang | append: '_name'] | default: item.en_name }}",
              lat: {{ item.lat }},
              lng: {{ item.lng }}
            }{% unless forloop.last %},{% endunless %}
            {% endfor %}
          {% endif %}
        ];

        if (locations.length > 0) {
            const markers = [];
            locations.forEach(loc => {
                const marker = L.marker([loc.lat, loc.lng]).addTo(mainMap);
                marker.bindPopup(`<b>${loc.name}</b>`);
                marker.bindTooltip(loc.name, { direction: 'top', offset: [0, -10] });
                markers.push([loc.lat, loc.lng]);
            });
            
            // 如果沒設定 center，自動縮放到包含所有點
            {% if page.map_center == nil %}
            mainMap.fitBounds(markers);
            {% endif %}
        }

        // 修改標題文字
        const caption = document.querySelector('.map-caption strong');
        if (caption) {
            caption.textContent = "{% if page.lang == 'zh' %}中萊茵河谷城堡分佈圖{% else %}Rhine Castles Map{% endif %}";
        }
    }, 100); // 延遲 100ms 避開 post.html 的執行
});
</script>
