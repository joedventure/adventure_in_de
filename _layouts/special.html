layout: post
---

{% comment %} 
  1. 這裡必須放 {{ content }}，Markdown 的文字才會傳遞到 post.html 裡面顯示 
{% endcomment %}
{{ content }}

<style>
    /* 強制讓目錄與地圖容器並排 */
    .info-row {
        display: flex !important;
        flex-wrap: wrap !important;
        gap: 20px !important;
    }

    /* 擴大原本 post.html 的地圖容器 */
    .city-static-map-container {
        flex: 2 1 450px !important;
        display: block !important; 
        height: auto !important;
    }

    #static-map {
        height: 450px !important;
        width: 100% !important;
    }

    .toc-box {
        flex: 1 1 250px !important;
    }

    @media (max-width: 900px) {
        .city-static-map-container { flex: 1 1 auto !important; }
        #static-map { height: 350px !important; }
    }
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // 使用 setTimeout 確保這段程式碼在 post.html 的腳本之後執行
    setTimeout(function() {
        const mapElement = document.getElementById('static-map');
        if (!mapElement) {
            console.error("找不到地圖容器 #static-map，請檢查 Front Matter 是否有設定座標觸發容器生成。");
            return;
        }

        // 強制清空 post.html 產生的舊地圖實例
        if (mapElement._leaflet_id) {
            mapElement._leaflet_id = null;
            mapElement.innerHTML = "";
        }

        // 初始化互動大地圖
        const mapCenter = [{{ page.map_center | default: "50.05, 7.75" }}];
        const zoomLevel = {{ page.map_zoom | default: 11 }};
        const mainMap = L.map('static-map').setView(mapCenter, zoomLevel);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(mainMap);

        // 載入州界 GeoJSON
        fetch("{{ site.baseurl }}/assets/germany_states.json")
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "#2c3e50", weight: 1, fillOpacity: 0.05 }
                }).addTo(mainMap);
            });

        // 載入 YAML 標點
        const locations = [
          {% assign data_name = page.data_source %}
          {% if site.data[data_name] %}
            {% for item in site.data[data_name] %}
            {
              name: "{{ item[page.lang | append: '_name'] | default: item.en_name }}",
              lat: {{ item.lat }},
              lng: {{ item.lng }}
            }{% unless forloop.last %},{% endunless %}
            {% endfor %}
          {% endif %}
        ];

        if (locations.length > 0) {
            locations.forEach(loc => {
                L.marker([loc.lat, loc.lng])
                 .addTo(mainMap)
                 .bindPopup(`<b>${loc.name}</b>`)
                 .bindTooltip(loc.name, { direction: 'top', offset: [0, -10] });
            });
        }

        // 更新標題文字
        const caption = document.querySelector('.map-caption strong');
        if (caption) {
            caption.textContent = "{% if page.lang == 'zh' %}中萊茵河谷城堡分佈圖{% else %}Rhine Castles Map{% endif %}";
        }
    }, 200); // 稍微加長延遲時間
});
</script>
